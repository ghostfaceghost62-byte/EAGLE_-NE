<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAGLE ONE | Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo" style="font-size: 1.4rem; margin-bottom: 0.5rem;">
                EAGLE <span class="accent-text">ONE</span>
            </div>
            <h2 style="font-size: 1.6rem; margin-bottom: 0.4rem;">NEW OPERATOR</h2>
            <p class="auth-subtitle">— ESTABLISH UPLINK ACCESS —</p>
        </div>

        <form onsubmit="handleRegister(event)" autocomplete="off">
            <div class="input-group">
                <span class="input-icon">⚡</span>
                <input type="text" id="reg-username" placeholder="OPERATOR ID" required
                       autocomplete="off" spellcheck="false" minlength="3">
            </div>
            <div class="input-group">
                <span class="input-icon">🔒</span>
                <input type="password" id="reg-password" placeholder="CREATE PASSCODE"
                       required oninput="checkPasswordStrength()" minlength="4">
            </div>
            <div id="strength-bar" class="strength-bar"></div>
            <div class="input-group" style="margin-top: 0.4rem;">
                <span class="input-icon">🔑</span>
                <input type="password" id="reg-confirm" placeholder="CONFIRM PASSCODE" required>
            </div>

            <div style="margin-top: 1.2rem;">
                <button type="submit" class="btn-primary btn-full">INITIALIZE REGISTRATION</button>
            </div>
        </form>

        <div id="reg-error" class="error-msg hidden" role="alert"></div>

        <div class="auth-footer">
            <a href="index.html" class="auth-link">← Abort / Return to Login</a>
        </div>
    </div>
</main>

<script src="auth.js"></script>
</body>
</html>
