<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAGLE ONE | Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
    if (!localStorage.getItem('eagle_active_user')) window.location.replace('index.html');
</script>

<!-- Back to store navbar -->
<nav class="navbar" style="justify-content: space-between;">
    <div class="logo" style="font-size: 1.2rem;">EAGLE <span class="accent-text">ONE</span></div>
    <button onclick="window.location.href='shop.html'" class="btn-outline" style="font-size: 0.78rem;">
        ← BACK TO STORE
    </button>
</nav>

<main class="auth-container" style="min-height: 100vh; padding-top: 90px; align-items: flex-start; padding-bottom: 40px;">
    <div class="auth-card checkout-card" style="max-width: 540px;">

        <div class="auth-header">
            <p class="label" style="margin-bottom: 0.5rem;">FINALIZE ORDER</p>
            <h2 style="font-size: 1.8rem;">SECURE <span class="accent-text">CHECKOUT</span></h2>
        </div>

        <!-- Order Summary -->
        <div style="margin-bottom: 1.5rem;">
            <p class="label" style="margin-bottom: 0.8rem;">ORDER SUMMARY</p>
            <div class="checkout-summary" id="checkout-items-summary">
                <p style="color: var(--text-muted); font-size: 0.85rem;">Loading cart...</p>
            </div>
            <div class="checkout-total-display">
                <span style="color: var(--text-muted); font-size: 0.8rem; letter-spacing: 2px; font-family: 'Space Mono', monospace; display: block; margin-bottom: 4px;">TOTAL DEPLOYMENT COST</span>
                <span id="checkout-total" class="accent-text" style="font-size: 2rem; font-family: 'Rajdhani', sans-serif; font-weight: 800;">₱0</span>
            </div>
        </div>

        <!-- Divider -->
        <div style="border-top: 1px solid var(--border); margin-bottom: 1.5rem;"></div>

        <!-- Checkout Form -->
        <p class="label" style="margin-bottom: 0.8rem;">DELIVERY INFORMATION</p>
        <form class="checkout-form" onsubmit="event.preventDefault(); placeOrder();">
            <div class="input-group">
                <span class="input-icon">👤</span>
                <input id="chk-name" type="text" placeholder="Full Operator Name" required>
            </div>
            <div class="input-group">
                <span class="input-icon">📍</span>
                <input id="chk-address" type="text" placeholder="Deployment Address" required>
            </div>
            <div class="input-group">
                <span class="input-icon">📞</span>
                <input id="chk-contact" type="tel" placeholder="Contact Number" required>
            </div>

            <div style="margin-top: 1rem;">
                <p class="label" style="margin-bottom: 0.8rem;">PAYMENT METHOD</p>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <label style="flex:1; min-width:120px; cursor:pointer;">
                        <input type="radio" name="payment" value="cod" checked style="width:auto; margin:0 6px 0 0;">
                        <span style="font-size: 0.85rem;">Cash on Delivery</span>
                    </label>
                    <label style="flex:1; min-width:120px; cursor:pointer;">
                        <input type="radio" name="payment" value="gcash" style="width:auto; margin:0 6px 0 0;">
                        <span style="font-size: 0.85rem;">GCash</span>
                    </label>
                </div>
            </div>

            <div class="checkout-buttons" style="margin-top: 1.5rem;">
                <button type="button" onclick="window.location.href='shop.html'" class="btn-outline">
                    ← ABORT
                </button>
                <button type="submit" class="btn-primary" id="confirm-btn">
                    CONFIRM DEPLOYMENT →
                </button>
            </div>
        </form>

        <p style="text-align:center; color:var(--text-muted); font-size:0.72rem; font-family:'Space Mono',monospace; margin-top:1.5rem; letter-spacing:1px;">
            🔒 SECURED TRANSACTION
        </p>
    </div>
</main>

<div id="toast-container"></div>

<script src="system.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const c = JSON.parse(localStorage.getItem('eagle_cart')) || [];
        const total = c.reduce((a, b) => a + (b.price * b.qty), 0);

        document.getElementById('checkout-total').innerText = '₱' + total.toLocaleString();

        const summaryEl = document.getElementById('checkout-items-summary');
        if (c.length === 0) {
            summaryEl.innerHTML = `<p style="color:var(--text-muted); font-size:0.85rem; text-align:center;">Your cart is empty.</p>`;
        } else {
            summaryEl.innerHTML = c.map(item => `
            <div class="checkout-summary-item">
                <div>
                    <strong style="font-size:0.88rem;">${item.name}</strong>
                    <span style="display:block; font-family:'Space Mono',monospace; font-size:0.7rem; color:var(--text-muted);">Qty: ${item.qty}</span>
                </div>
                <span style="color:var(--accent); font-family:'Rajdhani',sans-serif; font-weight:700; font-size:1rem;">
                    ₱${(item.price * item.qty).toLocaleString()}
                </span>
            </div>`).join('');
        }

        if (c.length === 0) {
            document.getElementById('confirm-btn').disabled = true;
        }
    });
</script>
</body>
</html>
